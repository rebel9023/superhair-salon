services:
  - type: web
    name: super-hair-art-backend
    env: node
    region: singapore
    plan: free
    buildCommand: npm install && npm run build
    startCommand: npm run start
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 5000
      - key: MONGODB_URI
        sync: false   # Set this in Render dashboard → MongoDB Atlas URI
      - key: JWT_ACCESS_SECRET
        sync: false   # Set this in Render dashboard
      - key: JWT_REFRESH_SECRET
        sync: false   # Set this in Render dashboard
      - key: JWT_ACCESS_EXPIRY
        value: 15m
      - key: JWT_REFRESH_EXPIRY
        value: 7d
      - key: FRONTEND_URL
        sync: false   # Set this to your Vercel frontend URL after deploying
