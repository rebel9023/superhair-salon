version: '3.8'

services:
  mongodb:
    image: mongo:latest
    container_name: salon_erp_mongodb
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db

  backend:
    build: ./backend
    container_name: salon_erp_backend
    ports:
      - "5000:5000"
    environment:
      - PORT=5000
      - MONGODB_URI=mongodb://mongodb:27017/salon_erp
      - JWT_ACCESS_SECRET=salon_erp_access_secret_token_2026_xyz
      - JWT_REFRESH_SECRET=salon_erp_refresh_secret_token_2026_abc
      - JWT_ACCESS_EXPIRY=15m
      - JWT_REFRESH_EXPIRY=7d
      - NODE_ENV=production
    depends_on:
      - mongodb

  frontend:
    build: ./frontend
    container_name: salon_erp_frontend
    ports:
      - "80:80"
    depends_on:
      - backend

volumes:
  mongo_data:
